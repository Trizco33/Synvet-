kind = "web"
previewPath = "/"
title = "Synvet"
version = "1.0.0"
id = "artifacts/synvet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24341

[services.development]
run = "pnpm --filter @workspace/synvet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/synvet", "run", "build" ]
publicDir = "artifacts/synvet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24341"
BASE_PATH = "/"

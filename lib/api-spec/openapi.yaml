      required: [items]

    CommsTestSendBody:
      type: object
      properties:
        channelId: { type: string, format: uuid }
        toAddress: { type: string, minLength: 5 }
        body: { type: string, minLength: 1, maxLength: 4000 }
      required: [channelId, toAddress, body]

    CommsDashboardResponse:
      type: object
      properties:
        channels:
          type: object
          properties:
            total: { type: integer }
            connected: { type: integer }
          required: [total, connected]
        templates:
          type: object
          properties:
            total: { type: integer }
          required: [total]
        automations:
          type: object
          properties:
            total: { type: integer }
            enabled: { type: integer }
          required: [total, enabled]
        messages:
          type: object
          properties:
            last30d: { type: integer }
            sent: { type: integer }
            failed: { type: integer }
            queued: { type: integer }
          required: [last30d, sent, failed, queued]
        recent:
          type: array
          items: { $ref: "#/components/schemas/CommsMessage" }
      required: [channels, templates, automations, messages, recent]

openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Synvet — Plataforma SaaS Veterinária
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard metrics & activity
  - name: tutors
    description: Tutores (donos dos pets)
  - name: pets
    description: Pacientes (pets)
  - name: consultations
    description: Consultas
  - name: anamneses
    description: Anamneses
  - name: exams
    description: Exames
  - name: vaccines
    description: Vacinas
  - name: clinic
    description: Clínica e configurações
  - name: team
    description: Equipe e permissões
  - name: storage
    description: Upload e armazenamento de arquivos
  - name: ai
    description: IA assistiva clínica (resumos, organização de texto, padrões)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /me:
    get:
      operationId: getMe
      tags: [clinic]
      summary: Usuário autenticado e clínica vinculada
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }

  /clinic:
    get:
      operationId: getClinic
      tags: [clinic]
      summary: Dados da clínica do usuário
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Clinic" }
    patch:
      operationId: updateClinic
      tags: [clinic]
      summary: Atualizar dados da clínica
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateClinicBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Clinic" }

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Métricas principais do dashboard
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  /dashboard/today-schedule:
    get:
      operationId: getTodaySchedule
      tags: [dashboard]
      summary: Agenda do dia (consultas)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ScheduledConsultation" }

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Atividades recentes (consultas, exames, novos pets)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActivityItem" }

  /auth/signup:
    post:
      operationId: signupUser
      tags: [auth]
      summary: Cadastrar novo usuário (sem confirmação de e-mail)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignupBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SignupResponse" }

  /leads:
    post:
      operationId: createLead
      tags: [leads]
      summary: Capturar lead do site institucional (público)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateLeadBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateLeadResponse" }

  /tutors:
    get:
      operationId: listTutors
      tags: [tutors]
      summary: Listar tutores
      parameters:
        - in: query
          name: q
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Tutor" }
    post:
      operationId: createTutor
      tags: [tutors]
      summary: Criar tutor
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTutorBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tutor" }

  /tutors/{tutorId}:
    parameters:
      - in: path
        name: tutorId
        required: true
        schema: { type: string }
    get:
      operationId: getTutor
      tags: [tutors]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TutorWithPets" }
    patch:
      operationId: updateTutor
      tags: [tutors]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTutorBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tutor" }
    delete:
      operationId: deleteTutor
      tags: [tutors]
      responses:
        "204":
          description: No Content

  /pets:
    get:
      operationId: listPets
      tags: [pets]
      summary: Listar pacientes
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: tutorId
          schema: { type: string }
        - in: query
          name: species
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PetWithTutor" }
    post:
      operationId: createPet
      tags: [pets]
      summary: Criar paciente
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePetBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Pet" }

  /pets/{petId}:
    parameters:
      - in: path
        name: petId
        required: true
        schema: { type: string }
    get:
      operationId: getPet
      tags: [pets]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PetDetail" }
    patch:
      operationId: updatePet
      tags: [pets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePetBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Pet" }
    delete:
      operationId: deletePet
      tags: [pets]
      responses:
        "204":
          description: No Content

  /pets/{petId}/consultations:
    parameters:
      - in: path
        name: petId
        required: true
        schema: { type: string }
    get:
      operationId: listPetConsultations
      tags: [consultations]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Consultation" }

  /pets/{petId}/exams:
    parameters:
      - in: path
        name: petId
        required: true
        schema: { type: string }
    get:
      operationId: listPetExams
      tags: [exams]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Exam" }

  /pets/{petId}/vaccines:
    parameters:
      - in: path
        name: petId
        required: true
        schema: { type: string }
    get:
      operationId: listPetVaccines
      tags: [vaccines]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Vaccine" }
    post:
      operationId: createVaccine
      tags: [vaccines]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateVaccineBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Vaccine" }

  /pets/{petId}/timeline:
    parameters:
      - in: path
        name: petId
        required: true
        schema: { type: string }
    get:
      operationId: getPetTimeline
      tags: [pets]
      summary: Linha do tempo unificada do paciente
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TimelineEvent" }

  /pets/{petId}/medical-records:
    parameters:
      - in: path
        name: petId
        required: true
        schema: { type: string }
    get:
      operationId: listMedicalRecords
      tags: [pets]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MedicalRecord" }
    post:
      operationId: createMedicalRecord
      tags: [pets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMedicalRecordBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MedicalRecord" }

  /consultations:
    get:
      operationId: listConsultations
      tags: [consultations]
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ConsultationWithPet" }
    post:
      operationId: createConsultation
      tags: [consultations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateConsultationBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Consultation" }

  /consultations/{consultationId}:
    parameters:
      - in: path
        name: consultationId
        required: true
        schema: { type: string }
    get:
      operationId: getConsultation
      tags: [consultations]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConsultationDetail" }
    patch:
      operationId: updateConsultation
      tags: [consultations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateConsultationBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Consultation" }
    delete:
      operationId: deleteConsultation
      tags: [consultations]
      responses:
        "204":
          description: No Content

  /consultations/{consultationId}/anamnesis:
    parameters:
      - in: path
        name: consultationId
        required: true
        schema: { type: string }
    get:
      operationId: getAnamnesis
      tags: [anamneses]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Anamnesis" }
    put:
      operationId: upsertAnamnesis
      tags: [anamneses]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertAnamnesisBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Anamnesis" }

  /exams:
    get:
      operationId: listExams
      tags: [exams]
      parameters:
        - in: query
          name: petId
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExamWithPet" }
    post:
      operationId: createExam
      tags: [exams]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateExamBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Exam" }

  /exams/{examId}:
    parameters:
      - in: path
        name: examId
        required: true
        schema: { type: string }
    delete:
      operationId: deleteExam
      tags: [exams]
      responses:
        "204":
          description: No Content

  /clinic/team:
    get:
      operationId: listTeam
      tags: [team]
      summary: Listar membros da clínica
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TeamMember" }

  /clinic/team/{memberId}:
    parameters:
      - in: path
        name: memberId
        required: true
        schema: { type: string }
    patch:
      operationId: updateTeamMember
      tags: [team]
      summary: Atualizar role/nome de membro (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTeamMemberBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamMember" }

  /storage/exams/signed-upload:
    post:
      operationId: createExamSignedUpload
      tags: [storage]
      summary: Criar URL assinada para upload de laudo (com progresso)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignedUploadBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SignedUploadResponse" }

  /ai/consultations/{consultationId}/summary:
    post:
      operationId: aiSummarizeConsultation
      tags: [ai]
      summary: Gerar resumo clínico estruturado de uma consulta (assistivo)
      parameters:
        - in: path
          name: consultationId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiResult" }

  /ai/organize-text:
    post:
      operationId: aiOrganizeText
      tags: [ai]
      summary: Reorganizar texto clínico livre em formato profissional
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AiOrganizeTextBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiResult" }

  /ai/pets/{petId}/timeline-summary:
    post:
      operationId: aiSummarizePetTimeline
      tags: [ai]
      summary: Resumo longitudinal da timeline clínica do paciente
      parameters:
        - in: path
          name: petId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiResult" }

  /ai/pets/{petId}/clinical-patterns:
    post:
      operationId: aiDetectClinicalPatterns
      tags: [ai]
      summary: Detectar padrões clínicos relevantes na timeline do paciente
      parameters:
        - in: path
          name: petId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiResult" }

  /ai/copilot/conversations:
    get:
      operationId: listCopilotConversations
      tags: [ai]
      summary: Listar conversas salvas do Copilot por paciente (escopo do usuário logado)
      parameters:
        - in: query
          name: petId
          required: true
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 20, minimum: 1, maximum: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListCopilotConversationsResponse" }

  /ai/copilot/conversations/{conversationId}:
    get:
      operationId: getCopilotConversation
      tags: [ai]
      summary: Carregar conversa do Copilot com mensagens
      parameters:
        - in: path
          name: conversationId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CopilotConversationDetail" }
    delete:
      operationId: deleteCopilotConversation
      tags: [ai]
      summary: Apagar conversa do Copilot
      parameters:
        - in: path
          name: conversationId
          required: true
          schema: { type: string }
      responses:
        "204": { description: Apagada }

  /storage/exams/signed-download:
    post:
      operationId: createExamSignedDownload
      tags: [storage]
      summary: Gerar URL assinada de download para um laudo já enviado
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignedDownloadBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SignedDownloadResponse" }

  /comms/dashboard:
    get:
      operationId: commsDashboard
      tags: [comms]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommsDashboardResponse" }

  /comms/channels:
    get:
      operationId: listCommsChannels
      tags: [comms]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListCommsChannelsResponse" }
    post:
      operationId: createCommsChannel
      tags: [comms]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCommsChannelBody" }
      responses:
        "201":
          description: Criado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommsChannel" }

  /comms/channels/{channelId}:
    patch:
      operationId: updateCommsChannel
      tags: [comms]
      parameters:
        - { in: path, name: channelId, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCommsChannelBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommsChannel" }
    delete:
      operationId: deleteCommsChannel
      tags: [comms]
      parameters:
        - { in: path, name: channelId, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Apagado }

  /comms/channels/{channelId}/connect:
    post:
      operationId: connectCommsChannel
      tags: [comms]
      summary: Inicia conexão e devolve payload do QR (mock retorna string fictícia)
      parameters:
        - { in: path, name: channelId, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommsChannelQrResponse" }

  /comms/channels/{channelId}/disconnect:
    post:
      operationId: disconnectCommsChannel
      tags: [comms]
      parameters:
        - { in: path, name: channelId, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommsChannel" }

  /comms/templates:
    get:
      operationId: listCommsTemplates
      tags: [comms]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListCommsTemplatesResponse" }
    post:
      operationId: createCommsTemplate
      tags: [comms]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCommsTemplateBody" }
      responses:
        "201":
          description: Criado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommsTemplate" }

  /comms/templates/{templateId}:
    patch:
      operationId: updateCommsTemplate
      tags: [comms]
      parameters:
        - { in: path, name: templateId, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCommsTemplateBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommsTemplate" }
    delete:
      operationId: deleteCommsTemplate
      tags: [comms]
      parameters:
        - { in: path, name: templateId, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Apagado }

  /comms/automations:
    get:
      operationId: listCommsAutomations
      tags: [comms]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListCommsAutomationsResponse" }
    post:
      operationId: createCommsAutomation
      tags: [comms]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCommsAutomationBody" }
      responses:
        "201":
          description: Criado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommsAutomation" }

  /comms/automations/{automationId}:
    patch:
      operationId: updateCommsAutomation
      tags: [comms]
      parameters:
        - { in: path, name: automationId, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCommsAutomationBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommsAutomation" }
    delete:
      operationId: deleteCommsAutomation
      tags: [comms]
      parameters:
        - { in: path, name: automationId, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Apagado }

  /comms/messages:
    get:
      operationId: listCommsMessages
      tags: [comms]
      parameters:
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: tutorId, schema: { type: string, format: uuid } }
        - { in: query, name: petId, schema: { type: string, format: uuid } }
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListCommsMessagesResponse" }

  /comms/test-send:
    post:
      operationId: commsTestSend
      tags: [comms]
      summary: Envia mensagem de teste (admin/vet) — usa o provider configurado
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommsTestSendBody" }
      responses:
        "201":
          description: Enfileirado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommsMessage" }

